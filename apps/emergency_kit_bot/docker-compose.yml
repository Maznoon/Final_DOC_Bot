version: '3.8'

services:
  bot:
    build: .
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/emergency_kit_db
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=emergency_kit_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
